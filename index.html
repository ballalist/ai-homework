<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Homework</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #fff;
      }

      header p {
        margin-top: 0.4rem;
        font-size: 0.85rem;
        color: #555;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        width: 100%;
        max-width: 580px;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 1.25rem;
        background: #111;
        border: 1px solid #1f1f1f;
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.15s,
          background 0.15s;
      }

      .card:hover {
        border-color: #333;
        background: #161616;
      }

      .card-num {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #444;
        text-transform: uppercase;
      }

      .card-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: #e5e5e5;
        line-height: 1.3;
      }

      .card-sub {
        font-size: 0.75rem;
        color: #555;
        line-height: 1.4;
      }

      .card-arrow {
        font-size: 0.75rem;
        color: #333;
        margin-top: 0.25rem;
      }

      .card:hover .card-arrow {
        color: #666;
      }

      /* active vs upcoming */
      .card.done .card-num {
        color: #6366f1;
      }
      .card.done .card-arrow {
        color: #4f46e5;
      }
      .card.done:hover {
        border-color: #2d2b6b;
      }

      .card.soon {
        opacity: 0.35;
        pointer-events: none;
      }

      footer {
        margin-top: 3rem;
        font-size: 0.72rem;
        color: #2a2a2a;
      }

      @media (max-width: 480px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AI Homework</h1>
      <p>AI Workflow Challenge</p>
    </header>

    <div class="grid">
      <a class="card done" href="homework1/index.html">
        <span class="card-num">HW 01</span>
        <span class="card-title">AI Feedback Classifier</span>
        <span class="card-sub">Player feedback analysis · 300 items</span>
        <span class="card-arrow">→</span>
      </a>

      <a class="card done" href="homework2/index.html">
        <span class="card-num">HW 02</span>
        <span class="card-title">Gacha Simulator</span>
        <span class="card-sub">Drop rate · Monte Carlo · Pity</span>
        <span class="card-arrow">→</span>
      </a>

      <a class="card done" href="homework3/index.html">
        <span class="card-num">HW 03</span>
        <span class="card-title">Restaurant Finder</span>
        <span class="card-sub">ย่านทองหล่อ · AI Scoring · Top 10</span>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <footer>AI Workflow Challenge · 2026</footer>
  </body>
</html>
